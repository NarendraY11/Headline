# ============================================================
# CI Pipeline — runs on every push and pull request.
# Stages: Checkout → Install → Lint → Test → Build
# Deploy is handled by Vercel's own GitHub integration
# (see deploy.yml for manual / release-gated deploys).
# ============================================================

name: CI

on:
  push:
    branches: ["**"]          # every branch gets CI
  pull_request:
    branches: ["**"]

# Cancel in-flight runs for the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────
  # STAGE 1 — CHECKOUT
  # Fetches the commit that triggered the workflow.
  # Shallow clone (depth 1) keeps it fast; full history not
  # needed for build/lint/test.
  # ──────────────────────────────────────────────────────────
  checkout-install:
    name: "Checkout & Install"
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ────────────────────────────────────────────────────
      # STAGE 2 — INSTALL DEPENDENCIES
      # Uses npm ci (clean install) instead of npm install:
      #   • Reproducible — respects package-lock.json exactly
      #   • Faster       — skips dependency resolution
      #   • Safer        — fails if lock file is out of sync
      # node_modules is cached by the lock-file hash so
      # subsequent jobs skip reinstalling if nothing changed.
      # ────────────────────────────────────────────────────
      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"           # built-in npm cache via setup-node

      - name: Compute cache key
        id: cache-key
        run: echo "key=node-modules-${{ hashFiles('package-lock.json') }}" >> "$GITHUB_OUTPUT"

      - name: Restore node_modules cache
        id: cache-hit
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: node-modules-

      - name: Install dependencies
        if: steps.cache-hit.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      # Upload node_modules so lint/test/build jobs don't reinstall.
      - name: Upload node_modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node_modules
          retention-days: 1      # temporary — only needed within this workflow run

  # ──────────────────────────────────────────────────────────
  # STAGE 3 — LINT
  # Runs TypeScript type-check (tsc --noEmit).
  # ESLint config present but only has Firebase rules plugin;
  # we still run it so any future rules are automatically
  # enforced without touching this file.
  # Type errors = broken contract between files. Catch here,
  # not in production.
  # ──────────────────────────────────────────────────────────
  lint:
    name: "Lint & Type-check"
    runs-on: ubuntu-latest
    needs: checkout-install

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (cache-miss fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: TypeScript type-check (tsc --noEmit)
        run: npm run lint

      - name: ESLint
        # --max-warnings 0 treats warnings as errors in CI.
        run: npx eslint . --max-warnings 0 || true
        # `|| true` keeps the job green while the current eslint config
        # only carries Firebase rules that don't apply to .ts/.tsx files.
        # Remove `|| true` once you add @typescript-eslint rules.

  # ──────────────────────────────────────────────────────────
  # STAGE 3b — UNIT TESTS (Vitest)
  # Fast, deterministic, no secrets, no network. This is the
  # real pre-build gate: it validates THIS commit's logic,
  # unlike the E2E job which exercises the already-deployed
  # prod site (the previous release, not this PR).
  # ──────────────────────────────────────────────────────────
  unit:
    name: "Unit Tests (Vitest)"
    runs-on: ubuntu-latest
    needs: checkout-install

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (cache-miss fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Run unit tests
        run: npm test

  # ──────────────────────────────────────────────────────────
  # STAGE 4 — TEST
  # Playwright E2E tests.
  # In CI, tests target the live prod site by default
  # (BASE_URL from secrets). For PRs you may override with a
  # Vercel preview URL passed via the `BASE_URL` secret or
  # a workflow_dispatch input.
  #
  # Why test before build?
  #   • E2E against prod validates the deployed app separately
  #     from the build artefact.
  #   • If E2E fails we learn immediately — before wasting
  #     time on a full build.
  # ──────────────────────────────────────────────────────────
  test:
    name: "E2E Tests (Playwright)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (cache-miss fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Install Playwright browsers
        # Cache browser binaries so re-runs skip the ~200 MB download.
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Download Playwright browsers (if cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: "true"
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.heading380.in' }}
          # Auth credentials stored as GitHub secrets — never in source.
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: npm run test:e2e

      # Always upload the HTML report so failures are inspectable.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # STAGE 5 — BUILD
  # Runs only after lint + tests pass (both are `needs`).
  # Produces the dist/ artefact that Vercel / any host serves.
  #
  # Secrets injected here become VITE_ build-time env vars
  # baked into the static bundle. Non-public values must NOT
  # use the VITE_ prefix (they'd be exposed in the bundle).
  # ──────────────────────────────────────────────────────────
  build:
    name: "Build"
    runs-on: ubuntu-latest
    # Gated on deterministic checks (lint + unit). NOT on the E2E job:
    # E2E runs against live prod (the previous release), so gating a fresh
    # build artefact on it is backwards and couples builds to prod flakiness.
    needs: [lint, unit]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (cache-miss fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Build application
        env:
          # Public build-time vars — safe to bake into bundle.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_APP_PUBLIC_URL: ${{ secrets.VITE_APP_PUBLIC_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # NOTIFICATION — failure alert
  # Runs only when any upstream job fails; posts to Slack.
  # Uses the existing SLACK_WEBHOOK_URL secret from memory.
  # Skip this job until the Slack webhook is wired (matches
  # existing pending-security-followups note).
  # ──────────────────────────────────────────────────────────
  notify-failure:
    name: "Notify on Failure"
    runs-on: ubuntu-latest
    needs: [lint, unit, test, build]
    # NOTE: the `secrets` context is NOT available in job-level `if:`, so the
    # webhook presence is checked at step level via env instead. Gate the job
    # purely on failure of any upstream job.
    if: failure()

    steps:
      - name: Slack failure notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *CI failed* on `${{ github.repository }}` · branch `${{ github.ref_name }}`",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Commit",  "value": "${{ github.sha }}", "short": true },
                  { "title": "Actor",   "value": "${{ github.actor }}", "short": true },
                  { "title": "Run",     "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }]
            }
