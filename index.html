<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          
          // Define a custom property on window for fetch with both getter and setter
          // This prevents errors when standard libraries/polyfills try to assign to window.fetch or globalThis.fetch
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not define fetch property on window, attempting prototype patch...", e);
          try {
            var proto = Object.getPrototypeOf(window);
            if (proto) {
              Object.defineProperty(proto, 'fetch', {
                get: function() {
                  return currentFetch;
                },
                set: function(val) {
                  currentFetch = val;
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e2) {
            console.error("Critical error: Failed to patch fetch setter", e2);
          }
        }
      })();
    </script>
