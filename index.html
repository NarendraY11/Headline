    <!-- iOS / Android standalone install polish (app is an explicit iOS PWA target). -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Heading" />
    <link rel="canonical" href="https://www.heading380.in/" />
    
    <link rel="preconnect" href="https://iwamrscqmedyklafiqvu.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://iwamrscqmedyklafiqvu.supabase.co" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Open Graph Protocol (Facebook, LinkedIn, Discord) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Heading — DGCA, EASA &amp; A320 Exam Prep for Pilots" />
    <meta property="og:description" content="Premium pilot exam preparation system. Realistic mock exams with negative marking, exam cutoffs, study diagnostics, and simulated cockpit stressful training for EASA &amp; DGCA licenses." />
    <meta property="og:image" content="https://www.heading380.in/og-image.png" />
    <meta property="og:url" content="https://www.heading380.in/" />
    
    <!-- Twitter Cards metadata (X, Slack) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Heading — DGCA, EASA &amp; A320 Exam Prep for Pilots" />
    <meta name="twitter:description" content="Premium pilot exam preparation system. Realistic mock exams with negative marking, exam cutoffs, study diagnostics, and simulated cockpit stressful training for EASA &amp; DGCA licenses." />
    <meta name="twitter:image" content="https://www.heading380.in/og-image.png" />

    <title>Heading — DGCA, EASA &amp; A320 Exam Prep for Pilots</title>

    <!-- Apply the persisted theme BEFORE first paint. Without this the `dark`
         class is only added later by a React effect (and only when the toggle
         mounts), causing a flash of the wrong theme + layout/contrast shift
         (CLS) on load, and dark-mode users briefly seeing the light theme.
         Externalized to /theme-init.js so production CSP can drop
         `script-src 'unsafe-inline'`. Blocking (no defer) so it runs first. -->
    <script src="/theme-init.js"></script>

    <!-- Instant boot splash. #root is otherwise empty until the entry chunk
         downloads, parses, and auth resolves (up to ~5s on a cold PWA), so the
         viewport painted the navy theme-color as a black void. This paints a
         branded spinner before any JS runs. React's createRoot replaces #root's
         children on mount, so the splash removes itself automatically. Styles
         are inline because index.css ships inside the JS bundle and isn't
         available this early. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f2ea;
        z-index: 9999;
      }
      html.dark #app-splash { background: #0d1a2d; }
      #app-splash .spin {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid rgba(20, 48, 90, 0.18);
        border-top-color: #14305a;
        animation: appsplashspin 0.8s linear infinite;
      }
      html.dark #app-splash .spin {
        border-color: rgba(245, 242, 234, 0.18);
        border-top-color: #f5f2ea;
      }
      @keyframes appsplashspin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .spin { animation: none; }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 20px; font-family: sans-serif;">
        <h1>Heading - Aviation Exam Preparation</h1>
        <p>Heading is a premium pilot examination study platform providing syllabus-aligned theoretical training, mock exams, and analytics for professional pilot licenses.</p>
        <p>Explore our courses:</p>
        <ul>

          <li><a href="/exams/dgca-atpl">DGCA ATPL Exam Prep</a></li>
          <li><a href="/exams/easa-atpl">EASA ATPL Exam Prep</a></li>
          <li><a href="/exams/faa-written">FAA Written Exam Prep</a></li>
          <li><a href="/exams/a320-type-rating">Airbus A320 Type Rating</a></li>
        </ul>
        <p><a href="/blog">Read our Flight Theory Blog</a></p>
      </div>
    </noscript>
    <div id="root"><div id="app-splash"><div class="spin"></div></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
