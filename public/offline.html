<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Heading</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #14305a; color: #f5f2ea;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        text-align: center; padding: 24px;
      }
      .card { max-width: 420px; }
      h1 { font-size: 1.4rem; margin: 0 0 0.5rem; }
      p { opacity: 0.8; line-height: 1.5; font-size: 0.95rem; }
      button {
        margin-top: 1.5rem; padding: 0.65rem 1.4rem; border: 0; border-radius: 999px;
        background: #f5f2ea; color: #14305a; font-weight: 600; cursor: pointer;
      }
      .dot { color: #ff4d4d; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline <span class="dot">•</span></h1>
      <p>Heading can't reach the network right now. Cached pages still work — reconnect to sync your latest progress and load new content.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
