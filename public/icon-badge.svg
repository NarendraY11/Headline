<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Monochrome notification badge: Android tints the badge by its alpha
       channel, so the glyph is a solid white compass silhouette on transparent.
       Derived from favicon.svg (brand compass), flattened to one color. -->
  <g fill="#ffffff">
    <circle cx="256" cy="256" r="184" fill="none" stroke="#ffffff" stroke-width="22" />
    <polygon points="256,96 300,256 256,288 212,256" />
    <polygon points="256,416 212,256 256,224 300,256" opacity="0.55" />
    <circle cx="256" cy="256" r="20" />
  </g>
</svg>
