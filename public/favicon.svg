<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Shield -->
  <rect width="512" height="512" rx="100" fill="#14305a" />
  
  <!-- Outer Compass Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#f5f2ea" stroke-width="12" stroke-dasharray="1 10" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="#f5f2ea" stroke-width="4" opacity="0.4" />
  <circle cx="256" cy="256" r="150" fill="none" stroke="#f5f2ea" stroke-width="2" opacity="0.2" />

  <!-- Main Compass Ring Accents (8 cardinal/ordinal ticks) -->
  <g stroke="#f5f2ea" stroke-width="6" stroke-linecap="round">
    <!-- North -->
    <line x1="256" y1="76" x2="256" y2="100" />
    <!-- South -->
    <line x1="256" y1="436" x2="256" y2="412" />
    <!-- East -->
    <line x1="436" y1="256" x2="412" y2="256" />
    <!-- West -->
    <line x1="76" y1="256" x2="100" y2="256" />
  </g>

  <!-- Cardinal Letter Indicators -->
  <text x="256" y="130" font-family="'Inter', 'Space Grotesk', sans-serif" font-size="28" font-weight="900" fill="#f5f2ea" text-anchor="middle" letter-spacing="1">N</text>
  <text x="256" y="405" font-family="'Inter', 'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#f5f2ea" opacity="0.6" text-anchor="middle">S</text>
  <text x="400" y="264" font-family="'Inter', 'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#f5f2ea" opacity="0.6" text-anchor="middle">E</text>
  <text x="112" y="264" font-family="'Inter', 'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#f5f2ea" opacity="0.6" text-anchor="middle">W</text>

  <!-- Compass Needle Shadows -->
  <polygon points="256,120 286,256 256,280" fill="#0c1d36" opacity="0.5" />
  <polygon points="256,392 286,256 256,280" fill="#0c1d36" opacity="0.3" />

  <!-- Compass Needle - Active (North is Amber/Vivid Gold, South is Paper Cream) -->
  <polygon points="256,120 256,256 226,256" fill="#f5f2ea" />
  <polygon points="256,120 286,256 256,256" fill="#ff4d4d" /> <!-- Aviation Signal Orange/Red highlight -->

  <polygon points="256,392 256,256 226,256" fill="#8a94a6" opacity="0.8" />
  <polygon points="256,392 286,256 256,256" fill="#f5f2ea" opacity="0.9" />

  <!-- Center Pin/Pivot -->
  <circle cx="256" cy="256" r="16" fill="#14305a" stroke="#f5f2ea" stroke-width="4" />
  <circle cx="256" cy="256" r="6" fill="#ff4d4d" />
</svg>
